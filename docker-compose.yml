services:
  mysql:
    image: mysql:8
    container_name: marsa-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: Root1234!
      MYSQL_DATABASE: marsa_ai
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pRoot1234!"]
      interval: 10s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: marsa-backend
    restart: unless-stopped
    environment:
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: Root1234!
      DB_NAME: marsa_ai
      LLAMA_CPP_URL: http://host.docker.internal:8080
      NODE_ENV: ${NODE_ENV:-development}
      WWEBJS_AUTH_PATH: /app/.wwebjs_auth
      UPLOAD_DIR: /app/uploads/bot-sources
    ports:
      - "3000:3000"
    volumes:
      - backend_whatsapp_auth:/app/.wwebjs_auth
      - backend_uploads:/app/uploads/bot-sources
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: marsa-frontend
    restart: unless-stopped
    environment:
      # Cible du proxy Vite /api → backend (nom du service Docker)
      DEV_PROXY_TARGET: http://backend:3000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  mysql_data:
  backend_whatsapp_auth:
  backend_uploads:
